<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C++ LeetCode Flashcards</title>
  <meta name="description" content="Curated C++ algorithm flashcards for coding interview preparation. Pattern recognition templates covering DP, Graph, Tree, Array, and more."/>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
  <!-- Sidebar toggle overlay (click to close on mobile) -->
  <div id="sidebar-overlay"></div>

  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title-row">
        <div class="sidebar-title-text">
          C++ LeetCode Flashcards
          <span>Interview Preparation</span>
        </div>
        <button id="sidebar-toggle" aria-label="Toggle sidebar" title="Toggle sidebar">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <!-- Overall progress bar -->
    <div id="overall-progress">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar-fill"></div>
      </div>
      <div class="progress-text">
        <span id="progress-count">0</span> / <span id="progress-total">0</span> read
        <span class="progress-actions">
          <button id="continue-btn" class="progress-btn" title="Jump to next unread card">▶ Continue</button>
          <button id="mark-all-btn" class="progress-btn" title="Mark all cards as read / unread">Mark All Read</button>
        </span>
      </div>
    </div>

    <div class="search-container">
      <input type="text" id="pattern-search" placeholder="🔍 Search patterns..." autocomplete="off" spellcheck="false"/>
    </div>
    <nav id="pattern-tabs"></nav>
  </aside>

  <main id="main-content">
    <div id="card-grid"></div>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
